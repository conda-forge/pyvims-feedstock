schema_version: 1

context:
  version: "1.1.1"

package:
  name: pyvims
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pyvims/pyvims-${{ version }}.tar.gz
  sha256: 6679a7ed46f9eb90351c6d77906fa9cee057cc437ca13bf49a5b7bd55849a3d1

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - pds = pyvims.pds.cli:cli

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}
    - numpy >=1.17,<2
    - matplotlib-base >=3.1
    - pillow
    - scipy
    - tqdm
    - requests
    - pvl

tests:
  - python:
      imports:
        - pyvims
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pds --help

about:
  summary: Python package to manipulate the Cassini VIMS data
  license: BSD-3-Clause
  license_file: LICENSE.md
  homepage: https://pypi.org/project/pyvims/

extra:
  recipe-maintainers:
    - seignovert
